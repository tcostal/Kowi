<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KOWI · Stock</title>
<style>
:root{
  --brand:#1a237e;--accent:#e65100;--green:#2e7d32;--green-l:#e8f5e9;
  --red:#c62828;--red-l:#ffebee;--amber:#f57c00;--amber-l:#fff8e1;
  --bg:#f0f4f8;--card:#fff;--border:#e0e0e0;--sub:#546e7a;--text:#1a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding-bottom:30px}
.hdr{background:var(--brand);color:#fff;padding:14px 16px 0;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:20px;font-weight:800}.logo em{color:#ffb74d;font-style:normal}
.alert-badge{background:var(--red);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;display:none}
.alert-badge.show{display:block}
.tabs{display:flex}
.tab{flex:1;padding:9px 4px;font-size:12px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:3px solid transparent;text-align:center}
.tab.on{color:#fff;border-bottom-color:#ffb74d}
.panel{display:none;padding:12px}.panel.on{display:block}
.card{background:var(--card);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:12px;overflow:hidden}
.card-hdr{background:var(--brand);color:#fff;padding:10px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.card-hdr small{font-size:11px;opacity:.75;font-weight:400}
.card-body{padding:10px 14px}
.srch-wrap{position:relative;margin-bottom:10px}
.srch{width:100%;padding:11px 14px 11px 36px;border:2px solid var(--border);border-radius:12px;font-size:15px;background:#fff;outline:none;-webkit-appearance:none}
.srch:focus{border-color:var(--brand)}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;font-size:14px}
.filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:10px}
.filter-row::-webkit-scrollbar{display:none}
.fpill{flex-shrink:0;padding:5px 13px;border-radius:20px;background:#e8eaf6;color:#283593;font-size:12px;font-weight:600;cursor:pointer;border:none}
.fpill.on{background:var(--brand);color:#fff}

/* ROWS */
.item-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f0f0f0}
.item-row:last-child{border-bottom:none}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px}
.item-meta{font-size:11px;color:var(--sub)}
.item-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.stk{font-size:18px;font-weight:800;min-width:36px;text-align:right}
.stk.ok{color:var(--green)}.stk.low{color:var(--amber)}.stk.out{color:var(--red)}.stk.new{color:#bbb}
.edit-btn{background:none;border:2px solid var(--border);border-radius:8px;padding:5px 10px;font-size:14px;cursor:pointer}
.edit-btn:active{background:#f0f0f0}

/* EDIT MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;display:none;align-items:flex-end}
.modal-ov.open{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:20px 16px 40px;max-height:80vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.3}
.modal-sub{font-size:12px;color:var(--sub);margin-bottom:14px}
.curr-block{background:var(--bg);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.curr-lbl{font-size:12px;font-weight:600;color:var(--sub)}
.curr-val{font-size:24px;font-weight:800}
.section-lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;margin-top:14px}
.qty-ctrl{display:flex;align-items:center;margin-bottom:4px}
.qb{width:48px;height:48px;border:2px solid var(--border);background:#f5f5f5;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--brand);font-weight:700;user-select:none}
.qb:first-child{border-radius:10px 0 0 10px}.qb:last-child{border-radius:0 10px 10px 0}
.qb:active{background:#e0e7ff}
.qn{flex:1;height:48px;border:2px solid var(--border);border-left:none;border-right:none;text-align:center;font-size:20px;font-weight:800;color:var(--brand);background:#fff;outline:none;-webkit-appearance:none;padding:0}
.set-inp{width:100%;padding:13px 14px;border:2px solid var(--border);border-radius:12px;font-size:18px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none;background:#fff}
.set-inp:focus{border-color:var(--brand)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn-apply{flex:1;padding:14px;border:none;border-radius:12px;background:var(--brand);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn-apply:active{filter:brightness(.9)}
.btn-cls{flex:1;padding:14px;border:2px solid #ccc;border-radius:12px;background:#fff;color:var(--sub);font-size:15px;font-weight:600;cursor:pointer}

/* ALERT ROWS */
.alert-section{background:var(--red-l);border:1.5px solid #f5c6cb;border-radius:14px;padding:14px;margin-bottom:12px}
.alert-sec-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px}
.alert-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(198,40,40,.1);font-size:13px}
.alert-row:last-child{border-bottom:none}
.alert-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.tag-out{background:var(--red-l);color:var(--red)}.tag-low{background:var(--amber-l);color:var(--amber)}

/* MOVS */
.mov-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.mov-row:last-child{border-bottom:none}
.mov-info{flex:1;min-width:0}
.mov-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mov-date{font-size:11px;color:var(--sub)}
.mov-tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;white-space:nowrap;margin-left:8px}
.tag-e{background:var(--green-l);color:var(--green)}
.tag-s{background:var(--red-l);color:var(--red)}
.tag-a{background:#e8eaf6;color:#283593}

/* CSV BUTTON */
.csv-btn{width:100%;padding:13px;border:2px solid var(--brand);border-radius:12px;background:#fff;color:var(--brand);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}

.empty{text-align:center;padding:40px 20px;color:var(--sub)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:500;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;max-width:92vw;text-align:center}
.toast.show{opacity:1}
</style>
</head>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">KOWI <em>·</em> Stock</div>
    <div class="alert-badge" id="alert-badge">0 alertas</div>
  </div>
  <div class="tabs">
    <div class="tab on" data-t="insumos" onclick="goTab('insumos')">🧵 Insumos</div>
    <div class="tab" data-t="reventa" onclick="goTab('reventa')">🛍️ Reventa</div>
    <div class="tab" data-t="alertas" onclick="goTab('alertas')">🚨 Alertas</div>
    <div class="tab" data-t="movs" onclick="goTab('movs')">📋 Movs.</div>
  </div>
</div>

<!-- INSUMOS -->
<div class="panel on" id="p-insumos">

  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button class="csv-btn" style="margin-bottom:0" onclick="exportCSV('insumos')">📥 Exportar insumos CSV</button>
    <button class="csv-btn" style="margin-bottom:0;border-color:var(--green);color:var(--green)" onclick="triggerImport('ins')">📤 Importar CSV</button>
  </div>
  <div id="ins-list"></div>
</div>

<!-- REVENTA -->
<div class="panel" id="p-reventa">
  <div class="srch-wrap">
    <span class="srch-ico">🔍</span>
    <input class="srch" id="rev-srch" type="search" placeholder="Buscar producto..." oninput="renderReventa()">
  </div>
  <div class="filter-row" id="rev-pills"></div>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button class="csv-btn" style="margin-bottom:0" onclick="exportCSV('reventa')">📥 Exportar reventa CSV</button>
    <button class="csv-btn" style="margin-bottom:0;border-color:var(--green);color:var(--green)" onclick="triggerImport('rev')">📤 Importar CSV</button>
  </div>
  <div id="rev-list"></div>
</div>

<!-- ALERTAS -->
<div class="panel" id="p-alertas"><div id="alertas-wrap"></div></div>

<!-- MOVIMIENTOS -->
<div class="panel" id="p-movs">
  <button class="csv-btn" onclick="exportCSV('movimientos')">📥 Exportar movimientos CSV</button>
  <div class="card"><div class="card-hdr">📋 Últimos movimientos</div><div class="card-body" id="movs-list"></div></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-ov" id="modal-ov" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-sub" id="m-sub"></div>
    <div class="curr-block">
      <span class="curr-lbl">Stock actual</span>
      <span class="curr-val" id="m-curr">0</span>
    </div>
    <div class="section-lbl">➕ Entrada (compra)</div>
    <div class="qty-ctrl">
      <button class="qb" onclick="chg('entrada',-1)">−</button>
      <input class="qn" id="m-entrada" type="number" inputmode="numeric" value="0" min="0">
      <button class="qb" onclick="chg('entrada',1)">+</button>
    </div>
    <div class="section-lbl">➖ Salida (uso / venta)</div>
    <div class="qty-ctrl">
      <button class="qb" onclick="chg('salida',-1)">−</button>
      <input class="qn" id="m-salida" type="number" inputmode="numeric" value="0" min="0">
      <button class="qb" onclick="chg('salida',1)">+</button>
    </div>
    <div class="section-lbl">✏️ Ajuste (fijar cantidad exacta)</div>
    <input class="set-inp" id="m-ajuste" type="number" inputmode="numeric" placeholder="Ingresá el stock real">
    <div class="modal-btns">
      <button class="btn-cls" onclick="closeModal()">Cancelar</button>
      <button class="btn-apply" onclick="applyModal()">✓ Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-import" accept=".csv" style="display:none" onchange="handleImport(this)">
<div class="modal-ov" id="import-preview-ov" style="align-items:center;justify-content:center;padding:20px" onclick="if(event.target===this)closeImportPreview()">

    <div style="font-size:12px;color:var(--sub);margin-bottom:14px" id="import-summary"></div>
    <div id="import-preview-list" style="margin-bottom:16px;max-height:280px;overflow-y:auto"></div>
    <div style="display:flex;gap:8px">
      <button style="flex:1;padding:13px;border:2px solid #ccc;border-radius:12px;background:#fff;color:var(--sub);font-size:15px;font-weight:600;cursor:pointer" onclick="closeImportPreview()">Cancelar</button>
      <button style="flex:1;padding:13px;border:none;border-radius:12px;background:var(--brand);color:#fff;font-size:15px;font-weight:700;cursor:pointer" onclick="applyImport()">✓ Aplicar</button>

  </div>
</div>

let sRev = {}; // stock reventa: {cod: {qty, loaded}}
let movs = [];
let revFilter = '';
let editCtx = null;

// ── LOAD ──────────────────────────────────────────────────────────────────
function load(){
  try{
    const si=localStorage.getItem('kowi_si'); if(si) sIns=JSON.parse(si);
    const sr=localStorage.getItem('kowi_sr'); if(sr) sRev=JSON.parse(sr);
    const mv=localStorage.getItem('kowi_mv'); if(mv) movs=JSON.parse(mv);
  }catch(e){}
  // ensure all items exist
  INS_DEF.forEach(i=>{ if(!sIns[i.nombre]) sIns[i.nombre]={qty:0,loaded:false}; });
  REV_DEF.forEach(p=>{ if(!sRev[p.cod])   sRev[p.cod]  ={qty:0,loaded:false}; });
}
function save(){
  try{
    localStorage.setItem('kowi_si',JSON.stringify(sIns));
    localStorage.setItem('kowi_sr',JSON.stringify(sRev));
    localStorage.setItem('kowi_mv',JSON.stringify(movs.slice(0,300)));
  }catch(e){}
}

// ── TABS ──────────────────────────────────────────────────────────────────
function goTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+t).classList.add('on');
  if(t==='insumos') renderInsumos();
  if(t==='reventa') renderReventa();
  if(t==='alertas') renderAlertas();
  if(t==='movs')    renderMovs();
}

// ── ALERTS BADGE ──────────────────────────────────────────────────────────
function updBadge(){
  // Only alert items that have been loaded at least once
  const ni=INS_DEF.filter(i=>sIns[i.nombre]?.loaded && sIns[i.nombre].qty<=MIN_INS).length;
  const nr=REV_DEF.filter(p=>sRev[p.cod]?.loaded   && sRev[p.cod].qty<=MIN_REV).length;
  const n=ni+nr;
  const b=document.getElementById('alert-badge');
  b.textContent=n+' alertas'; b.classList.toggle('show',n>0);
}

// ── INSUMOS ───────────────────────────────────────────────────────────────
function renderInsumos(){
  const q=(document.getElementById('ins-srch').value||'').toLowerCase();
  const list=INS_DEF.filter(i=>!q||i.nombre.toLowerCase().includes(q));
  const el=document.getElementById('ins-list');
  if(!list.length){el.innerHTML='<div class="empty">Sin resultados</div>';return;}
  let html='<div class="card"><div class="card-hdr">🧵 Insumos KOWI<small>'+list.length+' ítems</small></div><div class="card-body">';
  list.forEach(ins=>{
    const d=sIns[ins.nombre]||{qty:0,loaded:false};
    const cls=!d.loaded?'new':d.qty===0?'out':d.qty<=MIN_INS?'low':'ok';
    const disp=d.loaded?d.qty:'—';
    html+=`<div class="item-row">
      <div class="item-info">
        <div class="item-name">${ins.nombre}</div>
        <div class="item-meta">Uso prom. ~${ins.uso_promedio} por modelo</div>
      </div>
      <div class="item-right">
        <div class="stk ${cls}">${disp}</div>
        <button class="edit-btn" onclick="openModal('ins','${ins.nombre.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">✏️</button>
      </div>
    </div>`;
  });
  html+='</div></div>';
  el.innerHTML=html;
  updBadge();
}

// ── REVENTA ───────────────────────────────────────────────────────────────
function renderReventa(){
  const q=(document.getElementById('rev-srch').value||'').toLowerCase();
  const provs=[...new Set(REV_DEF.map(p=>p.proveedor))].sort();
  document.getElementById('rev-pills').innerHTML=
    '<button class="fpill '+(revFilter===''?'on':'')+'" onclick="setFilt(\'\')">Todos</button>'+
    provs.map(pr=>`<button class="fpill ${revFilter===pr?'on':''}" onclick="setFilt('${pr}')">${pr}</button>`).join('');

  const list=REV_DEF.filter(p=>(!q||p.nombre.toLowerCase().includes(q))&&(!revFilter||p.proveedor===revFilter));
  const el=document.getElementById('rev-list');
  if(!list.length){el.innerHTML='<div class="empty">Sin resultados</div>';return;}

  const byProv={};
  list.forEach(p=>{if(!byProv[p.proveedor])byProv[p.proveedor]=[];byProv[p.proveedor].push(p);});

  let html='';
  Object.entries(byProv).forEach(([prov,prods])=>{
    html+=`<div class="card"><div class="card-hdr">${prov}<small>${prods.length} productos</small></div><div class="card-body">`;
    prods.forEach(p=>{
      const d=sRev[p.cod]||{qty:0,loaded:false};
      const cls=!d.loaded?'new':d.qty===0?'out':d.qty<=MIN_REV?'low':'ok';
      const disp=d.loaded?d.qty:'—';
      html+=`<div class="item-row">
        <div class="item-info">
          <div class="item-name">${p.nombre}</div>
          <div class="item-meta">${p.familia}</div>
        </div>
        <div class="item-right">
          <div class="stk ${cls}">${disp}</div>
          <button class="edit-btn" onclick="openModal('rev','${p.cod}')">✏️</button>
        </div>
      </div>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
  updBadge();
}
function setFilt(f){revFilter=f;renderReventa();}

// ── ALERTAS ───────────────────────────────────────────────────────────────
function renderAlertas(){
  const insA=INS_DEF.filter(i=>sIns[i.nombre]?.loaded && sIns[i.nombre].qty<=MIN_INS);
  const revA=REV_DEF.filter(p=>sRev[p.cod]?.loaded   && sRev[p.cod].qty<=MIN_REV);
  const el=document.getElementById('alertas-wrap');
  let html='';
  if(insA.length){
    html+=`<div class="alert-section"><div class="alert-sec-title">🚨 Insumos KOWI</div>`;
    insA.forEach(i=>{
      const q=sIns[i.nombre].qty;
      html+=`<div class="alert-row"><span>${i.nombre}</span><span class="alert-tag ${q===0?'tag-out':'tag-low'}">${q===0?'⛔ AGOTADO':'⚠️ '+q+' uds.'}</span></div>`;
    });
    html+='</div>';
  }
  if(revA.length){
    html+=`<div class="alert-section"><div class="alert-sec-title">🚨 Reventa</div>`;
    revA.forEach(p=>{
      const q=sRev[p.cod].qty;
      html+=`<div class="alert-row"><span>${p.nombre}</span><span class="alert-tag ${q===0?'tag-out':'tag-low'}">${q===0?'⛔ AGOTADO':'⚠️ '+q+' uds.'}</span></div>`;
    });
    html+='</div>';
  }
  if(!insA.length&&!revA.length)
    html='<div class="empty"><div style="font-size:44px;margin-bottom:10px">✅</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">Todo en orden</div><div style="font-size:13px">Los ítems cargados están sobre el mínimo</div></div>';
  el.innerHTML=html;
}

// ── MOVIMIENTOS ───────────────────────────────────────────────────────────
function renderMovs(){
  const el=document.getElementById('movs-list');
  if(!movs.length){el.innerHTML='<div class="empty">Sin movimientos registrados</div>';return;}
  el.innerHTML=movs.slice(0,150).map(m=>`
    <div class="mov-row">
      <div class="mov-info">
        <div class="mov-name">${m.item}</div>
        <div class="mov-date">${m.fecha} · ${m.seccion==='ins'?'Insumo':'Reventa'}</div>
      </div>
      <span class="mov-tag tag-${m.tipo[0]}">${m.tipo==='entrada'?'+ '+m.cant:m.tipo==='salida'?'− '+m.cant:'= '+m.cant} → ${m.post}</span>
    </div>`).join('');
}

// ── EDIT MODAL ────────────────────────────────────────────────────────────
function openModal(sec,key){
  let nombre,curr;
  if(sec==='ins'){
    nombre=key; curr=(sIns[key]||{qty:0}).qty;
  } else {
    const p=REV_DEF.find(x=>x.cod===key);
    nombre=p?p.nombre:key; curr=(sRev[key]||{qty:0}).qty;
  }
  editCtx={sec,key,nombre};
  document.getElementById('m-title').textContent=nombre.length>45?nombre.slice(0,45)+'...':nombre;
  document.getElementById('m-sub').textContent=sec==='ins'?'Insumo KOWI':'Producto reventa';
  document.getElementById('m-curr').textContent=sIns[key]?.loaded||sRev[key]?.loaded?curr:'Sin cargar aún';
  document.getElementById('m-entrada').value=0;
  document.getElementById('m-salida').value=0;
  document.getElementById('m-ajuste').value='';
  document.getElementById('modal-ov').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal-ov').classList.remove('open');
  document.body.style.overflow='';
  editCtx=null;
}
function chg(f,d){
  const el=document.getElementById('m-'+f);
  el.value=Math.max(0,(parseInt(el.value)||0)+d);
}
function applyModal(){
  if(!editCtx) return;
  const {sec,key,nombre}=editCtx;
  const entrada=parseInt(document.getElementById('m-entrada').value)||0;
  const salida =parseInt(document.getElementById('m-salida').value)||0;
  const ajRaw  =document.getElementById('m-ajuste').value;
  const aj = ajRaw!==''?parseInt(ajRaw):null;
  const now=new Date().toLocaleDateString('es-AR')+' '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

  const getQ=()=>sec==='ins'?(sIns[key]||{qty:0}).qty:(sRev[key]||{qty:0}).qty;
  const setQ=(q,loaded=true)=>{ if(sec==='ins') sIns[key]={qty:q,loaded}; else sRev[key]={qty:q,loaded}; };

  let changed=false;
  if(aj!==null&&!isNaN(aj)&&aj>=0){
    setQ(aj); movs.unshift({fecha:now,seccion:sec,tipo:'ajuste',item:nombre,cant:aj,post:aj}); changed=true;
  } else {
    let q=getQ();
    if(entrada>0){ q+=entrada; setQ(q); movs.unshift({fecha:now,seccion:sec,tipo:'entrada',item:nombre,cant:entrada,post:q}); changed=true; }
    if(salida>0){  q=Math.max(0,q-salida); setQ(q); movs.unshift({fecha:now,seccion:sec,tipo:'salida',item:nombre,cant:salida,post:q}); changed=true; }
  }

  if(!changed){closeModal();return;}
  save(); closeModal();
  const q2=sec==='ins'?sIns[key].qty:sRev[key].qty;
  toast('✅ Stock actualizado → '+q2+' unidades');
  const t=document.querySelector('.tab.on').dataset.t;
  if(t==='insumos') renderInsumos();
  if(t==='reventa') renderReventa();
  if(t==='alertas') renderAlertas();
  updBadge();
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────
function exportCSV(tipo){
  let rows, hdrs, name;
  if(tipo==='insumos'){
    hdrs=['INSUMO','STOCK ACTUAL','USO PROMEDIO POR MODELO','ESTADO'];
    rows=INS_DEF.map(i=>{
      const d=sIns[i.nombre]||{qty:0,loaded:false};
      const st=!d.loaded?'Sin cargar':d.qty===0?'AGOTADO':d.qty<=MIN_INS?'BAJO':'OK';
      return [i.nombre, d.loaded?d.qty:'', i.uso_promedio, st];
    });
    name='stock_insumos';
  } else if(tipo==='reventa'){
    hdrs=['CÓDIGO','PRODUCTO','PROVEEDOR','FAMILIA','STOCK ACTUAL','ESTADO'];
    rows=REV_DEF.map(p=>{
      const d=sRev[p.cod]||{qty:0,loaded:false};
      const st=!d.loaded?'Sin cargar':d.qty===0?'AGOTADO':d.qty<=MIN_REV?'BAJO':'OK';
      return [p.cod, p.nombre, p.proveedor, p.familia, d.loaded?d.qty:'', st];
    });
    name='stock_reventa';
  } else {
    hdrs=['FECHA','SECCIÓN','TIPO','ÍTEM','CANTIDAD','STOCK POST'];
    rows=movs.map(m=>[m.fecha, m.seccion==='ins'?'Insumos':'Reventa', m.tipo, m.item, m.cant, m.post]);
    name='movimientos_stock';
  }
  const csv=[hdrs,...rows].map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=name+'_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('✅ CSV descargado');
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg,ms=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}


let importSec = null;
let importData = [];

function triggerImport(sec){
  importSec = sec;
  const el = document.getElementById('file-import');
  el.value = '';
  el.click();
}

function handleImport(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result.replace(/^\uFEFF/,''); // strip BOM
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length < 2){ toast('⚠️ CSV vacío o sin datos'); return; }

    // Parse CSV
    const parseRow = row => {
      const result = [];
      let cur = '', inQ = false;
      for(let i=0;i<row.length;i++){
        const c = row[i];
        if(c==='"'){ inQ=!inQ; continue; }
        if(c===','&&!inQ){ result.push(cur.trim()); cur=''; continue; }
        cur+=c;
      }
      result.push(cur.trim());
      return result;
    };

    const hdr = parseRow(lines[0]).map(h=>h.toLowerCase());
    
    // Find the stock column — accept "stock actual" or "stock"
    const stkIdx = hdr.findIndex(h=>h.includes('stock actual')||h==='stock');
    // Find key column
    const keyIdx = importSec==='ins'
      ? hdr.findIndex(h=>h.includes('insumo')||h==='nombre')
      : hdr.findIndex(h=>h.includes('código')||h.includes('codigo')||h==='código');

    if(stkIdx===-1){ toast('⚠️ No encontré columna "STOCK ACTUAL" en el CSV'); return; }
    if(keyIdx===-1){ toast('⚠️ No encontré columna de identificación en el CSV'); return; }

    importData = [];
    let valid=0, skip=0;

    lines.slice(1).forEach(line=>{
      const cols = parseRow(line);
      const key  = (cols[keyIdx]||'').trim();
      const raw  = (cols[stkIdx]||'').trim();
      if(!key || raw===''){ skip++; return; }
      const qty = parseInt(raw);
      if(isNaN(qty)||qty<0){ skip++; return; }

      // Validate key exists
      let exists = false;
      if(importSec==='ins') exists = INS_DEF.some(i=>i.nombre===key);
      else exists = REV_DEF.some(p=>p.cod===key);
      if(!exists){ skip++; return; }

      importData.push({key, qty});
      valid++;
    });

    document.getElementById('import-summary').textContent =
      valid+' ítems para actualizar · '+skip+' filas ignoradas (vacías, inválidas o no encontradas)';

    // Preview — show first 20
    const preview = importData.slice(0,20);
    document.getElementById('import-preview-list').innerHTML = preview.map(d=>`
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px">
        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px">${d.key.length>40?d.key.slice(0,40)+'...':d.key}</span>
        <strong style="color:var(--brand);white-space:nowrap">→ ${d.qty}</strong>
      </div>`).join('')+(importData.length>20?`<div style="padding:8px 0;font-size:12px;color:var(--sub);text-align:center">... y ${importData.length-20} más</div>`:'');

    document.getElementById('import-preview-ov').classList.add('open');
    document.body.style.overflow='hidden';
  };
  reader.readAsText(file, 'UTF-8');
}

function closeImportPreview(){
  document.getElementById('import-preview-ov').classList.remove('open');
  document.body.style.overflow='';
  importData=[];
}

function applyImport(){
  if(!importData.length){ closeImportPreview(); return; }
  const now=new Date().toLocaleDateString('es-AR')+' '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  importData.forEach(d=>{
    if(importSec==='ins'){
      sIns[d.key]={qty:d.qty,loaded:true};
      movs.unshift({fecha:now,seccion:'ins',tipo:'ajuste',item:d.key,cant:d.qty,post:d.qty});
    } else {
      sRev[d.key]={qty:d.qty,loaded:true};
      const p=REV_DEF.find(x=>x.cod===d.key);
      movs.unshift({fecha:now,seccion:'rev',tipo:'ajuste',item:p?p.nombre:d.key,cant:d.qty,post:d.qty});
    }
  });
  save(); closeImportPreview();
  toast('✅ '+importData.length+' ítems actualizados');
  const t=document.querySelector('.tab.on').dataset.t;
  if(t==='insumos') renderInsumos();
  if(t==='reventa') renderReventa();
  updBadge();
}

load(); renderInsumos(); updBadge();
</script>
