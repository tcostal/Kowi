<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KOWI · Precios</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --brand: #1a237e;
    --brand2: #283593;
    --accent: #e65100;
    --green: #1b5e20;
    --green-bg: #e8f5e9;
    --amber: #856404;
    --amber-bg: #fff3cd;
    --red: #c62828;
    --red-bg: #ffebee;
    --text: #1a1a1a;
    --sub: #546e7a;
    --border: #e0e0e0;
    --pill-bg: #e8eaf6;
    --pill-txt: #283593;
    --pill-on: #1a237e;
    --pill-on-txt: #fff;
    --shadow: 0 2px 8px rgba(0,0,0,.08);
    --r: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--brand); color: #fff; padding: 16px 16px 12px;
             position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
  .logo span { color: #ffb74d; }
  .count-badge { background: rgba(255,255,255,.15); border-radius: 20px;
                 padding: 3px 10px; font-size: 12px; }

  /* ── Search ── */
  .search-wrap { position: relative; }
  .search { width: 100%; padding: 10px 14px 10px 38px; border: none; border-radius: 10px;
            background: rgba(255,255,255,.12); color: #fff; font-size: 15px; outline: none; }
  .search::placeholder { color: rgba(255,255,255,.6); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
                 font-size: 15px; opacity: .7; pointer-events: none; }

  /* ── Filters ── */
  .filters-wrap { padding: 10px 16px; overflow-x: auto; display: flex; gap: 8px;
                  scrollbar-width: none; background: #fff;
                  border-bottom: 1px solid var(--border); }
  .filters-wrap::-webkit-scrollbar { display: none; }
  .pill { white-space: nowrap; padding: 6px 14px; border-radius: 20px;
          background: var(--pill-bg); color: var(--pill-txt);
          font-size: 12px; font-weight: 500; cursor: pointer; border: none;
          transition: all .15s; }
  .pill.on { background: var(--pill-on); color: var(--pill-on-txt); }

  /* ── Sort bar ── */
  .sort-bar { padding: 8px 16px; display: flex; align-items: center; gap: 8px;
              background: var(--bg); font-size: 12px; color: var(--sub); }
  .sort-bar select { border: 1px solid var(--border); border-radius: 8px;
                     padding: 4px 8px; font-size: 12px; background: #fff;
                     color: var(--text); outline: none; }
  .res-count { margin-left: auto; font-weight: 500; }

  /* ── Grid ── */
  .grid { padding: 4px 12px 80px; display: grid;
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }

  /* ── Card ── */
  .card { background: var(--card); border-radius: var(--r);
          box-shadow: var(--shadow); overflow: hidden;
          cursor: pointer; transition: transform .1s; active: scale(.97); }
  .card:active { transform: scale(.97); }
  .card-body { padding: 12px; }
  .card-subfam { font-size: 10px; font-weight: 600; color: var(--sub);
                 text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .card-name { font-size: 13px; font-weight: 600; line-height: 1.3;
               color: var(--text); margin-bottom: 8px; min-height: 34px; }
  .card-price { font-size: 19px; font-weight: 700; color: var(--accent); }
  .card-price-sub { font-size: 11px; color: var(--sub); margin-top: 1px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between;
                 padding: 7px 12px; background: #fafafa;
                 border-top: 1px solid var(--border); }
  .prov-tag { font-size: 10px; font-weight: 600; padding: 2px 7px;
              border-radius: 10px; background: var(--pill-bg); color: var(--pill-txt); }
  .prov-tag.kowi { background: #fff3e0; color: #e65100; }
  .stock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stock-dot.ok { background: #4caf50; }
  .stock-dot.low { background: #ff9800; }
  .stock-dot.out { background: #ef5350; }

  /* ── Modal ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45);
             z-index: 200; display: none; align-items: flex-end; }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%;
           padding: 0 0 32px; max-height: 85vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px;
                  margin: 10px auto 16px; }
  .modal-header { padding: 0 20px 16px; border-bottom: 1px solid var(--border); }
  .modal-subfam { font-size: 11px; font-weight: 600; color: var(--sub);
                  text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .modal-name { font-size: 18px; font-weight: 700; line-height: 1.3; }
  .modal-body { padding: 16px 20px; }
  .price-block { background: #fff8f5; border: 1px solid #ffe0cc;
                 border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
  .price-label { font-size: 11px; font-weight: 600; color: var(--sub);
                 text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .price-val { font-size: 32px; font-weight: 800; color: var(--accent); }
  .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .info-block { background: var(--bg); border-radius: 10px; padding: 12px; }
  .info-label { font-size: 10px; font-weight: 600; color: var(--sub);
                text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
  .info-val { font-size: 14px; font-weight: 600; }
  .stock-block { border-radius: 10px; padding: 12px; text-align: center; }
  .stock-block.ok { background: var(--green-bg); }
  .stock-block.low { background: var(--amber-bg); }
  .stock-block.out { background: var(--red-bg); }
  .stock-block .info-val { font-size: 20px; font-weight: 800; }
  .stock-block.ok .info-val { color: var(--green); }
  .stock-block.low .info-val { color: var(--amber); }
  .stock-block.out .info-val { color: var(--red); }
  .cod-row { display: flex; align-items: center; justify-content: space-between;
             background: var(--bg); border-radius: 10px; padding: 10px 12px; }
  .cod-txt { font-family: monospace; font-size: 12px; color: var(--sub); }
  .copy-btn { font-size: 11px; background: var(--brand); color: #fff;
              border: none; border-radius: 8px; padding: 4px 10px; cursor: pointer; }

  /* ── FAB ── */
  .fab { position: fixed; bottom: 20px; right: 16px; width: 52px; height: 52px;
         border-radius: 50%; background: var(--brand); color: #fff; font-size: 22px;
         border: none; box-shadow: 0 4px 14px rgba(0,0,0,.25); cursor: pointer;
         display: flex; align-items: center; justify-content: center; z-index: 99; }

  /* ── Empty ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--sub); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">KOWI <span>·</span> Precios</div>
    <div class="count-badge" id="count-badge">199 productos</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" id="search" type="search" placeholder="Buscar producto..." autocomplete="off">
  </div>
</div>

<div class="filters-wrap" id="filters">
  <button class="pill on" onclick="setFilter('')" data-f="">Todo</button>
  <button class="pill" onclick="setFilter('KOWI')" data-f="KOWI">✨ KOWI</button>
  <button class="pill" onclick="setFilter('ACCESORIOS BEBE')" data-f="ACCESORIOS BEBE">Accesorios bebé</button>
  <button class="pill" onclick="setFilter('PORTACHUPETE')" data-f="PORTACHUPETE">Portachupete</button>
  <button class="pill" onclick="setFilter('JUGUETES')" data-f="JUGUETES">Juguetes</button>
  <button class="pill" onclick="setFilter('ROPA')" data-f="ROPA">Ropa</button>
  <button class="pill" onclick="setFilter('stock')" data-f="stock">📦 Con stock</button>
</div>

<div class="sort-bar">
  <label for="sort" style="font-size:12px">Ordenar:</label>
  <select id="sort" onchange="render()">
    <option value="nombre">A → Z</option>
    <option value="precio_asc">Precio ↑</option>
    <option value="precio_desc">Precio ↓</option>
    <option value="stock">Stock disponible</option>
  </select>
  <span class="res-count" id="res-count"></span>
</div>

<div class="grid" id="grid"></div>

<div class="empty" id="empty" style="display:none">
  <div class="empty-icon">🔎</div>
  <div>No se encontraron productos</div>
</div>

<!-- Modal detalle -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-subfam" id="m-subfam"></div>
      <div class="modal-name" id="m-name"></div>
    </div>
    <div class="modal-body">
      <div class="price-block">
        <div class="price-label">Precio Transferencia / Efectivo</div>
        <div class="price-val" id="m-price"></div>
      </div>
      <div class="price-grid">
        <div class="info-block">
          <div class="info-label">Precio Efectivo</div>
          <div class="info-val" id="m-efect"></div>
        </div>
        <div class="stock-block" id="m-stock-block">
          <div class="info-label">Stock</div>
          <div class="info-val" id="m-stock"></div>
        </div>
      </div>
      <div class="price-grid">
        <div class="info-block">
          <div class="info-label">Familia</div>
          <div class="info-val" id="m-fam"></div>
        </div>
        <div class="info-block">
          <div class="info-label">Proveedor</div>
          <div class="info-val" id="m-prov"></div>
        </div>
      </div>
      <div style="height:10px"></div>
      <div class="cod-row">
        <span class="cod-txt" id="m-cod"></span>
        <button class="copy-btn" onclick="copyCod()">Copiar código</button>
      </div>
    </div>
  </div>
</div>

veedor": "CLARA VALENCIA", "precio": 12160, "precio_efectivo": 9072, "stock": 0}];

let currentFilter = '';
let currentSearch = '';
let currentSort = 'nombre';
let activeProd = null;

function fmt(n){ return '$ ' + n.toLocaleString('es-AR'); }

function stockClass(s){
  if(s === 0) return 'out';
  if(s <= 2) return 'low';
  return 'ok';
}
function stockLabel(s){
  if(s === 0) return '⛔ Sin stock';
  if(s <= 2) return '⚠️ Últimas ' + s;
  return s + ' unidades';
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('on', p.dataset.f === f);
  });
  render();
}

function render(){
  currentSort = document.getElementById('sort').value;
  let list = PRODUCTS.filter(p => {
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || p.nombre.toLowerCase().includes(q) || 
                        p.subfam.toLowerCase().includes(q) ||
                        p.familia.toLowerCase().includes(q);
    let matchFilter = true;
    if(currentFilter === 'KOWI') matchFilter = p.proveedor === 'KOWI';
    else if(currentFilter === 'stock') matchFilter = p.stock > 0;
    else if(currentFilter) matchFilter = p.familia === currentFilter || p.subfam === currentFilter;
    return matchSearch && matchFilter;
  });

  // Sort
  if(currentSort === 'nombre') list.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  else if(currentSort === 'precio_asc') list.sort((a,b)=>a.precio-b.precio);
  else if(currentSort === 'precio_desc') list.sort((a,b)=>b.precio-a.precio);
  else if(currentSort === 'stock') list.sort((a,b)=>b.stock-a.stock);

  document.getElementById('res-count').textContent = list.length + ' resultados';
  document.getElementById('empty').style.display = list.length ? 'none' : 'block';

  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(p => `
    <div class="card" onclick="openModal('${p.cod}')">
      <div class="card-body">
        <div class="card-subfam">${p.subfam || p.familia}</div>
        <div class="card-name">${p.nombre.replace('- MODELO','<br><span style="font-weight:400;font-size:11px;color:#888">MODELO')}</span></div>
        <div class="card-price">${fmt(p.precio)}</div>
        <div class="card-price-sub">transferencia</div>
      </div>
      <div class="card-footer">
        <span class="prov-tag ${p.proveedor==='KOWI'?'kowi':''}">${p.proveedor}</span>
        <div class="stock-dot ${stockClass(p.stock)}" title="Stock: ${p.stock}"></div>
      </div>
    </div>
  `).join('');
}

function openModal(cod){
  const p = PRODUCTS.find(x => x.cod === cod);
  if(!p) return;
  activeProd = p;
  document.getElementById('m-subfam').textContent = p.subfam || p.familia;
  document.getElementById('m-name').textContent = p.nombre;
  document.getElementById('m-price').textContent = fmt(p.precio);
  document.getElementById('m-efect').textContent = fmt(p.precio_efectivo);
  document.getElementById('m-fam').textContent = p.familia;
  document.getElementById('m-prov').textContent = p.proveedor;
  document.getElementById('m-cod').textContent = p.cod;
  const sc = stockClass(p.stock);
  const sb = document.getElementById('m-stock-block');
  sb.className = 'stock-block ' + sc;
  document.getElementById('m-stock').textContent = stockLabel(p.stock);
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e){
  if(e.target === document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
}

function copyCod(){
  if(!activeProd) return;
  navigator.clipboard.writeText(activeProd.cod).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copiado';
    setTimeout(()=>btn.textContent='Copiar código', 1500);
  });
}

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

render();
</script>
