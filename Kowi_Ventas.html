<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KOWI · Ventas</title>
<style>
:root{
  --brand:#1a237e;--brand2:#283593;--accent:#e65100;--green:#2e7d32;--green-l:#e8f5e9;
  --red:#c62828;--red-l:#ffebee;--amber:#f57c00;--amber-l:#fff8e1;
  --bg:#f0f4f8;--card:#fff;--border:#e0e0e0;--sub:#546e7a;--text:#1a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
     background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:20px}

/* HEADER */
.hdr{background:var(--brand);color:#fff;padding:14px 16px 0;
     box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:20px;font-weight:800;letter-spacing:.3px}
.logo em{color:#ffb74d;font-style:normal}
.badge{background:rgba(255,255,255,.2);border-radius:20px;
       padding:4px 12px;font-size:12px;font-weight:600}

/* TABS */
.tabs{display:flex}
.tab{flex:1;padding:10px 4px;font-size:13px;font-weight:600;
     color:rgba(255,255,255,.55);cursor:pointer;
     border-bottom:3px solid transparent;text-align:center;
     transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab.on{color:#fff;border-bottom-color:#ffb74d}

/* PANELS */
.panel{display:none;padding:14px 12px}
.panel.on{display:block}

/* CARDS */
.card{background:var(--card);border-radius:16px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:14px;overflow:hidden}
.card-hdr{background:var(--brand);color:#fff;padding:11px 14px;
          font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.card-body{padding:14px}

/* FIELDS */
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--sub);
     text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.req{color:var(--accent)}

/* NATIVE SELECT — funciona en iOS y Android */
.sel-wrap{position:relative}
.sel-wrap::after{content:'▼';position:absolute;right:14px;top:50%;
                 transform:translateY(-50%);font-size:11px;color:var(--sub);
                 pointer-events:none}
select{width:100%;padding:13px 36px 13px 14px;border:2px solid var(--border);
       border-radius:12px;font-size:16px;background:#fff;color:var(--text);
       -webkit-appearance:none;appearance:none;outline:none;cursor:pointer}
select:focus{border-color:var(--brand)}

/* TEXT INPUTS */
input[type=text],input[type=number],input[type=search]{
  width:100%;padding:13px 14px;border:2px solid var(--border);border-radius:12px;
  font-size:16px;background:#fff;color:var(--text);outline:none;
  -webkit-appearance:none;appearance:none}
input:focus{border-color:var(--brand)}
input[type=number]{text-align:right}

/* QTY */
.qty-row{display:flex;align-items:center;gap:0}
.qb{width:50px;height:50px;border:2px solid var(--border);background:#f5f5f5;
    font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--brand);font-weight:700;flex-shrink:0;
    -webkit-tap-highlight-color:transparent;user-select:none}
.qb:first-child{border-radius:12px 0 0 12px}
.qb:last-child{border-radius:0 12px 12px 0}
.qb:active{background:#e0e7ff}
.qn{flex:1;height:50px;border:2px solid var(--border);border-left:none;border-right:none;
    text-align:center;font-size:22px;font-weight:800;color:var(--brand);
    background:#fff;outline:none;-webkit-appearance:none;padding:0}

/* TOGGLES */
.tog-group{display:flex;gap:8px}
.tog{flex:1;padding:13px 8px;border:2px solid var(--border);border-radius:12px;
     text-align:center;font-size:15px;font-weight:700;cursor:pointer;
     background:#fafafa;color:var(--sub);transition:all .15s;
     -webkit-tap-highlight-color:transparent;user-select:none}
.tog:active{opacity:.8}
.tog.g{border-color:var(--green);background:var(--green);color:#fff}
.tog.b{border-color:var(--brand);background:var(--brand);color:#fff}
.tog.o{border-color:var(--accent);background:var(--accent);color:#fff}

/* SELECTED PRODUCT */
.sel-prod{background:var(--green-l);border:2px solid #81c784;border-radius:12px;
          padding:12px 14px;margin-top:10px;display:none}
.sel-prod.show{display:block}
.sel-prod-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.sel-prod-name{font-size:14px;font-weight:700;color:var(--green);flex:1;line-height:1.3}
.sel-prod-price{font-size:18px;font-weight:800;color:var(--accent);white-space:nowrap}
.sel-prod-clear{background:none;border:none;font-size:24px;cursor:pointer;
                color:#888;padding:0;line-height:1;flex-shrink:0}

/* ADD BUTTON */
.btn-add{width:100%;padding:14px;border:none;border-radius:12px;
         background:var(--accent);color:#fff;font-size:16px;font-weight:800;
         cursor:pointer;margin-top:12px;letter-spacing:.3px;
         -webkit-tap-highlight-color:transparent}
.btn-add:active{filter:brightness(.9)}
.btn-add:disabled{background:#bbb;cursor:not-allowed}

/* ITEMS LIST */
.items-list{margin-bottom:14px}
.item-row{background:var(--card);border-radius:12px;padding:12px 14px;
          margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);
          display:flex;align-items:flex-start;gap:10px}
.ir-info{flex:1;min-width:0}
.ir-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:2px}
.ir-sub{font-size:11px;color:var(--sub);margin-bottom:3px}
.ir-price{font-size:14px;font-weight:700;color:var(--accent)}
.ir-del{background:none;border:none;font-size:24px;cursor:pointer;
        color:#ddd;padding:0;flex-shrink:0;
        -webkit-tap-highlight-color:transparent}
.ir-del:active{color:var(--red)}

/* TOTALS */
.totals{background:var(--brand);color:#fff;border-radius:14px;
        padding:16px;margin-bottom:14px}
.tot-r{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
.tot-disc{color:#ffb74d}
.tot-big{font-size:22px;font-weight:900;
         border-top:1px solid rgba(255,255,255,.3);margin-top:8px;padding-top:10px}

/* SAVE / CANCEL */
.btn-save{width:100%;padding:16px;border:none;border-radius:14px;
          background:var(--green);color:#fff;font-size:17px;font-weight:800;
          cursor:pointer;margin-bottom:10px;letter-spacing:.3px;
          -webkit-tap-highlight-color:transparent}
.btn-save:active{filter:brightness(.9)}
.btn-cancel{width:100%;padding:13px;border:2px solid #ccc;border-radius:12px;
            background:#fff;color:var(--sub);font-size:14px;font-weight:600;
            cursor:pointer;-webkit-tap-highlight-color:transparent}

/* HISTORIAL */
.hi{background:var(--card);border-radius:14px;padding:14px;
    margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.hi-top{display:flex;justify-content:space-between;align-items:flex-start;
        gap:8px;margin-bottom:7px}
.hi-title{font-size:14px;font-weight:700;flex:1;line-height:1.4}
.hi-monto{font-size:17px;font-weight:800;color:var(--accent);white-space:nowrap}
.hi-items{font-size:12px;color:var(--sub);margin-bottom:8px;line-height:1.7}
.hi-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.htag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;
      background:#e8eaf6;color:#283593}
.htag.tc{background:#dbeafe;color:#1e3a8a}
.htag.nc{background:#dcfce7;color:#14532d}
.htag.ef{background:#fef9c3;color:#713f12}
.hi-date{font-size:11px;color:var(--sub)}
.hi-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;
            border-top:1px solid var(--border)}
.btn-del-venta{flex:1;padding:9px;border:2px solid var(--red);border-radius:10px;
               background:#fff;color:var(--red);font-size:13px;font-weight:700;
               cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-del-venta:active{background:var(--red-l)}

/* RESUMEN */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:var(--card);border-radius:14px;padding:14px;text-align:center;
    box-shadow:0 1px 6px rgba(0,0,0,.07)}
.sc-lbl{font-size:11px;font-weight:700;color:var(--sub);
        text-transform:uppercase;margin-bottom:5px}
.sc-val{font-size:22px;font-weight:800}
.ov{color:var(--accent)}.gv{color:var(--green)}.bv{color:var(--brand)}
.ebtn{width:100%;padding:14px;border:2px solid var(--brand);border-radius:12px;
      background:#fff;color:var(--brand);font-size:14px;font-weight:700;
      cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
.dbtn{width:100%;padding:14px;border:2px solid var(--red);border-radius:12px;
      background:#fff;color:var(--red);font-size:14px;font-weight:600;
      cursor:pointer;-webkit-tap-highlight-color:transparent}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--sub)}
.empty-ico{font-size:48px;margin-bottom:12px}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
       background:#222;color:#fff;padding:12px 24px;border-radius:24px;
       font-size:14px;font-weight:500;z-index:9999;
       opacity:0;pointer-events:none;transition:opacity .25s;
       white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}

/* CONFIRM MODAL */
.conf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
              z-index:9998;display:none;align-items:center;justify-content:center;
              padding:20px}
.conf-overlay.show{display:flex}
.conf-box{background:#fff;border-radius:20px;padding:24px;max-width:320px;
          width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.conf-title{font-size:17px;font-weight:700;margin-bottom:8px}
.conf-msg{font-size:14px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.conf-btns{display:flex;gap:10px}
.conf-no{flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;
         background:#fff;font-size:15px;font-weight:600;cursor:pointer}
.conf-yes{flex:1;padding:12px;border:none;border-radius:12px;
          background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">KOWI <em>·</em> Ventas</div>
    <div class="badge" id="badge">0 productos</div>
  </div>
  <div class="tabs">
    <div class="tab on" data-t="form" onclick="goTab('form')">➕ Nueva</div>
    <div class="tab" data-t="hist" onclick="goTab('hist')">📋 Historial</div>
    <div class="tab" data-t="sum"  onclick="goTab('sum')">📊 Resumen</div>
  </div>
</div>

<!-- ══ NUEVA VENTA ══ -->
<div class="panel on" id="p-form">

  <div class="card">
    <div class="card-hdr">🛍️ Agregar producto</div>
    <div class="card-body">

      <div class="field">
        <label class="lbl">Producto <span class="req">*</span></label>
        <div class="sel-wrap">
          <select id="prod-sel" onchange="onProdSel(this.value)">
            <option value="">— Seleccioná un producto —</option>
          </select>
        </div>
        <div class="sel-prod" id="sel-prod">
          <div class="sel-prod-top">
            <div class="sel-prod-name" id="sel-name"></div>
            <div class="sel-prod-price" id="sel-price"></div>
            <button class="sel-prod-clear" onclick="clearSel()">×</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="lbl">Cantidad</label>
        <div class="qty-row">
          <button class="qb" onclick="chgQty(-1)">−</button>
          <input class="qn" id="qty" type="number" inputmode="numeric" value="1" min="1" max="99">
          <button class="qb" onclick="chgQty(1)">+</button>
        </div>
      </div>

      <button class="btn-add" id="btn-add" onclick="addItem()" disabled>＋ Agregar a la venta</button>
    </div>
  </div>

  <!-- Items agregados -->
  <div class="items-list" id="items-list" style="display:none"></div>

  <!-- Cobro — inputs persistentes, nunca re-renderizados -->
  <div class="card" id="cobro-card" style="display:none">
    <div class="card-hdr">💸 Cobro</div>
    <div class="card-body">

      <div class="field">
        <label class="lbl">Método de pago <span class="req">*</span></label>
        <div class="tog-group">
          <div class="tog g" id="t-tr" onclick="setMet('TR')">📲 Transferencia</div>
          <div class="tog" id="t-ef" onclick="setMet('EF')">💵 Efectivo</div>
        </div>
      </div>

      <div class="field">
        <label class="lbl">Quién cobró <span class="req">*</span></label>
        <div class="tog-group">
          <div class="tog b" id="t-tc" onclick="setQ('TC')">TC</div>
          <div class="tog"   id="t-nc" onclick="setQ('NC')">NC</div>
        </div>
      </div>

      <div class="field">
        <label class="lbl">Descuento % <span style="text-transform:none;font-weight:400;font-size:11px">(opcional)</span></label>
        <input type="number" inputmode="decimal" id="desc" min="0" max="100" placeholder="0" oninput="updTot()">
      </div>

      <div class="field">
        <label class="lbl">Envío $ <span style="text-transform:none;font-weight:400;font-size:11px">(opcional)</span></label>
        <input type="number" inputmode="decimal" id="env" min="0" placeholder="$ 0" oninput="updTot()">
      </div>

      <div class="field">
        <label class="lbl">Cliente <span style="text-transform:none;font-weight:400;font-size:11px">(opcional)</span></label>
        <input type="text" id="cli" placeholder="Nombre del cliente">
      </div>

      <div class="field">
        <label class="lbl">Observaciones</label>
        <input type="text" id="obs" placeholder="Ej: envío incluido, regalo...">
      </div>
    </div>
  </div>

  <!-- Totales -->
  <div class="totals" id="tot-block" style="display:none">
    <div class="tot-r"><span id="tot-lbl">Subtotal</span><span id="tot-sub"></span></div>
    <div class="tot-r tot-disc" id="tot-disc-r" style="display:none">
      <span id="tot-disc-l">Descuento</span><span id="tot-disc-v"></span>
    </div>
    <div class="tot-r" id="tot-env-r" style="display:none">
      <span>Envío</span><span id="tot-env-v"></span>
    </div>
    <div class="tot-r tot-big"><span>TOTAL</span><span id="tot-tot"></span></div>
  </div>

  <button class="btn-save" id="btn-save" style="display:none" onclick="guardar()">✓ GUARDAR VENTA</button>
  <button class="btn-cancel" id="btn-cancel" style="display:none" onclick="resetForm()">Cancelar y empezar de nuevo</button>

</div>

<!-- ══ HISTORIAL ══ -->
<div class="panel" id="p-hist">
  <div id="hist-list"></div>
</div>

<!-- ══ RESUMEN ══ -->
<div class="panel" id="p-sum">
  <div class="sg">
    <div class="sc"><div class="sc-lbl">Total vendido</div><div class="sc-val ov" id="s-tot">$ 0</div></div>
    <div class="sc"><div class="sc-lbl">Ventas</div><div class="sc-val bv" id="s-cnt">0</div></div>
    <div class="sc"><div class="sc-lbl">TC cobró</div><div class="sc-val gv" id="s-tc">$ 0</div></div>
    <div class="sc"><div class="sc-lbl">NC cobró</div><div class="sc-val gv" id="s-nc">$ 0</div></div>
  </div>
  <button class="ebtn" onclick="exportCSV()">📥 Exportar CSV para Excel</button>
  <button class="dbtn" onclick="clearAll()">🗑️ Borrar todo el historial</button>
</div>

<!-- CONFIRM MODAL -->
<div class="conf-overlay" id="conf-overlay">
  <div class="conf-box">
    <div class="conf-title" id="conf-title">¿Confirmás?</div>
    <div class="conf-msg" id="conf-msg"></div>
    <div class="conf-btns">
      <button class="conf-no" onclick="closeConf()">Cancelar</button>
      <button class="conf-yes" id="conf-yes">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const fmt = n => '$ ' + Math.round(n).toLocaleString('es-AR');

// ── INIT: populate select ─────────────────────────────────────────────────
(function initSelect(){
  const sel = document.getElementById('prod-sel');
  // Group: KOWI first, then alphabetical
  const kowi  = PRODS.filter(p=>p.kowi).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const otros = PRODS.filter(p=>!p.kowi).sort((a,b)=>a.nombre.localeCompare(b.nombre));

  const grp1 = document.createElement('optgroup');
  grp1.label = '✨ KOWI (producción propia)';
  kowi.forEach(p=>{
    const o=document.createElement('option');
    o.value=p.cod; o.textContent=p.nombre+' — '+fmt(p.precio);
    grp1.appendChild(o);
  });

  const grp2 = document.createElement('optgroup');
  grp2.label = '🏪 Reventa';
  otros.forEach(p=>{
    const o=document.createElement('option');
    o.value=p.cod; o.textContent=p.nombre+' — '+fmt(p.precio);
    grp2.appendChild(o);
  });

  sel.appendChild(grp1);
  sel.appendChild(grp2);
})();

// ── TABS ──────────────────────────────────────────────────────────────────
function goTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+t).classList.add('on');
  if(t==='hist') renderHist();
  if(t==='sum')  renderSum();
}

// ── PRODUCT SELECT ────────────────────────────────────────────────────────
function onProdSel(cod){
  if(!cod){ clearSel(); return; }
  selP = PRODS.find(p=>p.cod===cod);
  document.getElementById('sel-name').textContent  = selP.nombre;
  document.getElementById('sel-price').textContent = fmt(selP.precio);
  document.getElementById('sel-prod').classList.add('show');
  document.getElementById('btn-add').disabled = false;
}

function clearSel(){
  selP = null;
  document.getElementById('prod-sel').value = '';
  document.getElementById('sel-prod').classList.remove('show');
  document.getElementById('btn-add').disabled = true;
}

// ── QTY ───────────────────────────────────────────────────────────────────
function chgQty(d){
  const el=document.getElementById('qty');
  el.value = Math.max(1, Math.min(99, (parseInt(el.value)||1)+d));
}

// ── ADD ITEM ──────────────────────────────────────────────────────────────
function addItem(){
  if(!selP){ toast('⚠️ Seleccioná un producto'); return; }
  const qty = parseInt(document.getElementById('qty').value)||1;
  const idx = items.findIndex(i=>i.cod===selP.cod);
  if(idx>=0){ items[idx].qty += qty; }
  else{
    items.push({
      cod:selP.cod, nombre:selP.nombre, familia:selP.familia,
      subfam:selP.subfam, proveedor:selP.proveedor, kowi:selP.kowi,
      precio:selP.precio, qty
    });
  }
  clearSel();
  document.getElementById('qty').value = 1;
  updItems();
  toast('✅ Producto agregado');
}

// ── UPDATE ITEMS (solo esta sección, nunca toca cobro ni totals) ──────────
function updItems(){
  const hasItems = items.length > 0;
  const n = items.reduce((s,i)=>s+i.qty,0);
  document.getElementById('badge').textContent = n===0?'0 productos':(n===1?'1 producto':n+' productos');

  ['items-list','cobro-card','tot-block','btn-save','btn-cancel']
    .forEach(id=>document.getElementById(id).style.display=hasItems?'block':'none');

  if(!hasItems){ document.getElementById('items-list').innerHTML=''; updTot(); return; }

  const kowi  = items.filter(i=>i.kowi);
  const otros = items.filter(i=>!i.kowi);
  let html = '<div class="card"><div class="card-hdr">🛒 Productos en esta venta ('+items.length+')</div><div class="card-body" style="padding:10px 14px">';

  [...kowi.map(i=>itemHTML(i,'✨ ')), ...otros.map(i=>itemHTML(i,''))].forEach(h=>html+=h);
  html += '</div></div>';
  document.getElementById('items-list').innerHTML = html;
  updTot();
}

function itemHTML(it, prefix){
  return `<div class="item-row">
    <div class="ir-info">
      <div class="ir-name">${prefix}${it.nombre}</div>
      <div class="ir-sub">${it.subfam||it.familia} · ${it.proveedor}</div>
      <div class="ir-price">${fmt(it.precio)} × ${it.qty} = <strong>${fmt(it.precio*it.qty)}</strong></div>
    </div>
    <button class="ir-del" onclick="delItem('${it.cod}')">🗑</button>
  </div>`;
}

function delItem(cod){
  items = items.filter(i=>i.cod!==cod);
  updItems();
}

// ── TOTALS ────────────────────────────────────────────────────────────────
function updTot(){
  if(!items.length) return;
  const sub  = items.reduce((s,i)=>s+i.precio*i.qty, 0);
  const disc = (parseFloat(document.getElementById('desc').value)||0)/100;
  const env  = parseFloat(document.getElementById('env').value)||0;
  const dAmt = Math.round(sub*disc);
  const tot  = sub - dAmt + env;
  const n    = items.reduce((s,i)=>s+i.qty, 0);

  document.getElementById('tot-lbl').textContent = 'Subtotal ('+n+' art.)';
  document.getElementById('tot-sub').textContent = fmt(sub);
  document.getElementById('tot-tot').textContent = fmt(tot);

  const dr = document.getElementById('tot-disc-r');
  if(dAmt>0){
    dr.style.display='flex';
    document.getElementById('tot-disc-l').textContent = 'Descuento ('+Math.round(disc*100)+'%)';
    document.getElementById('tot-disc-v').textContent = '− '+fmt(dAmt);
  } else dr.style.display='none';

  const er = document.getElementById('tot-env-r');
  if(env>0){
    er.style.display='flex';
    document.getElementById('tot-env-v').textContent = fmt(env);
  } else er.style.display='none';
}

// ── TOGGLES ───────────────────────────────────────────────────────────────
function setMet(m){
  met=m;
  document.getElementById('t-tr').className='tog'+(m==='TR'?' g':'');
  document.getElementById('t-ef').className='tog'+(m==='EF'?' o':'');
}
function setQ(q){
  quien=q;
  document.getElementById('t-tc').className='tog'+(q==='TC'?' b':'');
  document.getElementById('t-nc').className='tog'+(q==='NC'?' b':'');
}

// ── GUARDAR ───────────────────────────────────────────────────────────────
function guardar(){
  if(!items.length){ toast('⚠️ Agregá al menos un producto'); return; }
  const sub  = items.reduce((s,i)=>s+i.precio*i.qty, 0);
  const disc = (parseFloat(document.getElementById('desc').value)||0)/100;
  const env  = parseFloat(document.getElementById('env').value)||0;
  const dAmt = Math.round(sub*disc);
  const tot  = sub - dAmt + env;

  ventas.unshift({
    id: Date.now(),
    fecha: new Date().toLocaleDateString('es-AR'),
    hora:  new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}),
    items: [...items], sub, discPct:Math.round(disc*100), dAmt, env, tot,
    met, quien,
    cli: document.getElementById('cli').value.trim(),
    obs: document.getElementById('obs').value.trim()
  });
  saveVentas();
  toast('✅ Venta guardada — '+fmt(tot));
  resetForm();
}

function saveVentas(){
  try{ localStorage.setItem('kowi_ventas', JSON.stringify(ventas)); } catch(e){}
}

function resetForm(){
  items=[];
  clearSel();
  document.getElementById('qty').value=1;
  document.getElementById('desc').value='';
  document.getElementById('env').value='';
  document.getElementById('cli').value='';
  document.getElementById('obs').value='';
  met='TR'; setMet('TR');
  quien='TC'; setQ('TC');
  updItems();
}

// ── HISTORIAL ─────────────────────────────────────────────────────────────
function renderHist(){
  const el = document.getElementById('hist-list');
  if(!ventas.length){
    el.innerHTML='<div class="empty"><div class="empty-ico">📋</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">No hay ventas registradas</div><div style="font-size:13px">Cargá tu primera venta desde "Nueva"</div></div>';
    return;
  }
  el.innerHTML = ventas.map((v,idx)=>`
    <div class="hi" id="hi-${v.id}">
      <div class="hi-top">
        <div class="hi-title">${v.items.length===1?v.items[0].nombre:v.items.length+' productos'}</div>
        <div class="hi-monto">${fmt(v.tot)}</div>
      </div>
      <div class="hi-items">${v.items.map(i=>`${i.kowi?'✨ ':''}${i.nombre} ×${i.qty}`).join('<br>')}</div>
      <div class="hi-tags">
        <span class="htag ${v.quien.toLowerCase()}">${v.quien}</span>
        <span class="htag ${v.met==='EF'?'ef':''}">${v.met==='TR'?'Transferencia':'Efectivo'}</span>
        ${v.dAmt>0?`<span class="htag">Desc. ${v.discPct}%</span>`:''}
        ${v.env>0?`<span class="htag">Envío ${fmt(v.env)}</span>`:''}
        ${v.cli?`<span class="htag">${v.cli}</span>`:''}
      </div>
      <div class="hi-date">${v.fecha} ${v.hora}${v.obs?' · '+v.obs:''}</div>
      <div class="hi-actions">
        <button class="btn-del-venta" onclick="confirmarBorrar(${v.id})">🗑 Eliminar esta venta</button>
      </div>
    </div>`
  ).join('');
}

// ── BORRAR VENTA INDIVIDUAL ───────────────────────────────────────────────
let pendingDelId = null;

function confirmarBorrar(id){
  const v = ventas.find(x=>x.id===id);
  if(!v) return;
  pendingDelId = id;
  document.getElementById('conf-title').textContent = 'Eliminar venta';
  document.getElementById('conf-msg').textContent =
    (v.items.length===1?v.items[0].nombre:v.items.length+' productos')+
    ' — '+fmt(v.tot)+'\n'+v.fecha+' '+v.hora;
  document.getElementById('conf-yes').onclick = () => borrarVenta(id);
  document.getElementById('conf-overlay').classList.add('show');
}

function borrarVenta(id){
  ventas = ventas.filter(v=>v.id!==id);
  saveVentas();
  closeConf();
  renderHist();
  toast('🗑 Venta eliminada');
}

function closeConf(){
  document.getElementById('conf-overlay').classList.remove('show');
  pendingDelId = null;
}

// Cerrar modal tocando afuera
document.getElementById('conf-overlay').addEventListener('click', function(e){
  if(e.target===this) closeConf();
});

// ── RESUMEN ───────────────────────────────────────────────────────────────
function renderSum(){
  const tot = ventas.reduce((s,v)=>s+v.tot, 0);
  const tc  = ventas.filter(v=>v.quien==='TC').reduce((s,v)=>s+v.tot, 0);
  const nc  = ventas.filter(v=>v.quien==='NC').reduce((s,v)=>s+v.tot, 0);
  document.getElementById('s-tot').textContent = fmt(tot);
  document.getElementById('s-cnt').textContent = ventas.length;
  document.getElementById('s-tc').textContent  = fmt(tc);
  document.getElementById('s-nc').textContent  = fmt(nc);
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────
function exportCSV(){
  if(!ventas.length){ toast('No hay ventas para exportar'); return; }
  const hdrs=['FECHA','HORA','TIPO','CÓDIGO','PRODUCTO','FAMILIA','SUB FAMILIA',
              'PROVEEDOR','CANTIDAD','MÉTODO PAGO','PRECIO UNIT','SUBTOTAL ITEM',
              'DESC %','ENVÍO','TOTAL VENTA','QUIÉN COBRÓ','CLIENTE','OBSERVACIONES'];
  const rows=[];
  ventas.forEach(v=>{
    v.items.forEach((it,i)=>{
      rows.push([
        v.fecha,v.hora,'VENTA',it.cod,it.nombre,it.familia,it.subfam,
        it.proveedor,it.qty,
        i===0?(v.met==='TR'?'TRANSFERENCIA':'EFECTIVO'):'',
        it.precio,it.precio*it.qty,
        i===0?v.discPct+'%':'',
        i===0?v.env:'',
        i===0?v.tot:'',
        i===0?v.quien:'',
        i===0?v.cli:'',
        i===0?v.obs:''
      ]);
    });
  });
  const csv=[hdrs,...rows]
    .map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(','))
    .join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ventas_kowi_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('✅ CSV descargado');
}

// ── BORRAR TODO ───────────────────────────────────────────────────────────
function clearAll(){
  document.getElementById('conf-title').textContent='Borrar todo el historial';
  document.getElementById('conf-msg').textContent='Esta acción eliminará todas las '+ventas.length+' ventas registradas. No se puede deshacer.';
  document.getElementById('conf-yes').onclick=()=>{
    ventas=[]; saveVentas(); closeConf(); renderSum();
    document.getElementById('hist-list').innerHTML='';
    toast('Historial borrado');
    goTab('sum');
  };
  document.getElementById('conf-overlay').classList.add('show');
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg, ms=2400){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}
</script>
